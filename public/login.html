<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --muted-bg: #f4f4f5;
        --border: #e4e4e7;
        --input-bg: #ffffff;
        --ring: #18181b;
        --card-bg: #ffffff;
        --card-shadow:
          0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --radius: 0.5rem;
        --btn-bg: #18181b;
        --btn-fg: #fafafa;
        --btn-hover: #27272a;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --muted-bg: #27272a;
          --border: #27272a;
          --input-bg: #000000;
          --ring: #d4d4d8;
          --card-bg: #121212;
          --card-shadow:
            0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.4);
          --btn-bg: #fafafa;
          --btn-fg: #18181b;
          --btn-hover: #e4e4e7;
        }
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 360px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        box-shadow: var(--card-shadow);
        padding: 2rem;
      }

      .header {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      h1 {
        font-size: 1.375rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      label {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--fg);
      }

      input {
        width: 100%;
        height: 2.375rem;
        padding: 0 0.75rem;
        font-family: inherit;
        font-size: 0.875rem;
        color: var(--fg);
        background: var(--input-bg);
        border: 1px solid var(--border);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      input::placeholder {
        color: var(--muted);
      }

      input:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
      }

      button[type="submit"] {
        width: 100%;
        height: 2.375rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--btn-fg);
        background: var(--btn-bg);
        border: none;
        cursor: pointer;
        margin-top: 0.25rem;
        transition:
          background 0.15s,
          opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      button[type="submit"]:hover {
        background: var(--btn-hover);
      }
      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .spinner {
        display: none;
        width: 14px;
        height: 14px;
        border: 2px solid color-mix(in srgb, var(--btn-fg) 30%, transparent);
        border-top-color: var(--btn-fg);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-msg {
        display: none;
        font-size: 0.8125rem;
        color: #ef4444;
        background: color-mix(in srgb, #ef4444 10%, transparent);
        border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
        padding: 0.625rem 0.75rem;
      }

      .footer {
        text-align: center;
        font-size: 0.8125rem;
        color: var(--muted);
        margin-top: 1.25rem;
      }

      .footer a {
        color: var(--fg);
        font-weight: 500;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        body {
          padding: 1rem;
        }
        .card {
          padding: 1.5rem;
        }
        .field-row {
          flex-direction: column;
          gap: 1rem;
        }
        input,
        button[type="submit"] {
          height: 2.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1>Welcome back</h1>
        <p class="subtitle" id="subtitle">
          Sign in to your account to continue
        </p>
      </div>

      <form class="form" id="loginForm" novalidate>
        <div id="errorMsg" class="error-msg" role="alert"></div>

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="Enter email address"
            required
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" id="submitBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Sign in</span>
        </button>
      </form>

      <div class="footer">
        Don't have an account?
        <a id="signupLink" href="/signup.html">Sign up</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const errorMsg = document.getElementById("errorMsg");
      const subtitle = document.getElementById("subtitle");
      const signupLink = document.getElementById("signupLink");

      const params = new URLSearchParams(window.location.search);

      const clientName = params.get("client_name");
      if (clientName) {
        subtitle.textContent = "Sign in to continue to " + clientName;
      }

      signupLink.href = "/signup.html" + window.location.search;

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
      }

      function hideError() {
        errorMsg.style.display = "none";
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        spinner.style.display = loading ? "block" : "none";
        btnText.textContent = loading ? "Signing in…" : "Sign in";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Please fill in all fields.");
          return;
        }

        setLoading(true);

        try {
          const res = await fetch("/authorize/callback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email,
              password,
              client_id: params.get("client_id"),
              redirect_uri: params.get("redirect_uri"),
              scope: params.get("scope"),
              state: params.get("state"),
              nonce: params.get("nonce"),
              code_challenge: params.get("code_challenge"),
              code_challenge_method: params.get("code_challenge_method"),
            }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(
              data.message || "Something went wrong. Please try again.",
            );
          } else if (data.redirect) {
            window.location.href = data.redirect;
          }
        } catch {
          showError("Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
