<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --border: #e4e4e7;
        --card-bg: #ffffff;
        --card-shadow:
          0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --radius: 0.5rem;
        --btn-bg: #18181b;
        --btn-fg: #fafafa;
        --btn-hover: #27272a;
        --tag-bg: #f4f4f5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
          --card-bg: #121212;
          --card-shadow:
            0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.4);
          --btn-bg: #fafafa;
          --btn-fg: #18181b;
          --btn-hover: #e4e4e7;
          --tag-bg: #27272a;
        }
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        box-shadow: var(--card-shadow);
        padding: clamp(1.25rem, 5vw, 2rem);
      }

      .header {
        text-align: center;
        margin-bottom: 1.75rem;
      }

      h1 {
        font-size: clamp(1.125rem, 4vw, 1.375rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--muted);
        margin-top: 0.35rem;
        line-height: 1.5;
      }

      .info {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8125rem;
        gap: 0.5rem;
      }

      .info-label {
        color: var(--muted);
        flex-shrink: 0;
      }

      .info-value {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        background: var(--tag-bg);
        padding: 0.2rem 0.5rem;
        overflow-wrap: break-word;
        word-break: break-word;
        text-align: right;
        min-width: 0;
      }

      .btn {
        width: 100%;
        height: 2.375rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--btn-fg);
        background: var(--btn-bg);
        border: none;
        cursor: pointer;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn:hover {
        background: var(--btn-hover);
      }

      .footer {
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 1.25rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1>Demo Client</h1>
        <p class="subtitle">Test the OIDC Authorization Code flow with PKCE</p>
      </div>

      <div class="info">
        <div class="info-row">
          <span class="info-label">Client ID:</span>
          <span class="info-value">demo-app</span>
        </div>
        <div class="info-row">
          <span class="info-label">Scopes:</span>
          <span class="info-value">openid profile email</span>
        </div>
        <div class="info-row">
          <span class="info-label">PKCE:</span>
          <span class="info-value">S256</span>
        </div>
      </div>

      <button class="btn" id="loginBtn">Login with OIDC Provider</button>

      <p class="footer">Redirects to localhost:8080 for authentication</p>
    </div>

    <script>
      const PROVIDER = "http://localhost:8080";
      const CLIENT_ID = "demo-app";
      const REDIRECT_URI = "http://localhost:3000/callback";
      const SCOPE = "openid profile email";

      function base64url(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      function generateRandom(length) {
        return base64url(crypto.getRandomValues(new Uint8Array(length)));
      }

      async function generateCodeChallenge(verifier) {
        const data = new TextEncoder().encode(verifier);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return base64url(hash);
      }

      document
        .getElementById("loginBtn")
        .addEventListener("click", async () => {
          const state = generateRandom(32);
          const nonce = generateRandom(16);
          const codeVerifier = generateRandom(32);
          const codeChallenge = await generateCodeChallenge(codeVerifier);

          sessionStorage.setItem("oidc_state", state);
          sessionStorage.setItem("oidc_nonce", nonce);
          sessionStorage.setItem("oidc_code_verifier", codeVerifier);

          const params = new URLSearchParams({
            response_type: "code",
            client_id: CLIENT_ID,
            redirect_uri: REDIRECT_URI,
            scope: SCOPE,
            state: state,
            nonce: nonce,
            code_challenge: codeChallenge,
            code_challenge_method: "S256",
          });

          window.location.href = `${PROVIDER}/authorize?${params}`;
        });
    </script>
  </body>
</html>
